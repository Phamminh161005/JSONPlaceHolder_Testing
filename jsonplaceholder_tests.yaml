# ============================================================
# JSONPlaceholder REST API Test Suite
# Positive CRUD Test Cases
# ============================================================

- config:
    testset: "JSONPlaceholder REST API Test Suite"
    base_url: "https://jsonplaceholder.typicode.com"
    timeout: 5

# ============================================================
# POSTS
# ============================================================

- test:
    name: "TC01 - GET tat ca posts -> 200 OK"
    url: "/posts"
    method: GET
    expected_status: [200]
    validators:
      - compare:
          jsonpath_mini: "0.id"
          comparator: "eq"
          expected: 1
      - compare:
          jsonpath_mini: "0.userId"
          comparator: "eq"
          expected: 1


- test:
    name: "TC02 - GET post hop le id=1 -> 200 OK"
    url: "/posts/1"
    method: GET
    expected_status: [200]
    validators:
      - compare:
          jsonpath_mini: "id"
          comparator: "eq"
          expected: 1
      - compare:
          jsonpath_mini: "userId"
          comparator: "eq"
          expected: 1


- test:
    name: "TC03 - GET comments cua post id=1 -> 200 OK"
    url: "/posts/1/comments"
    method: GET
    expected_status: [200]
    validators:
      - compare:
          jsonpath_mini: "0.postId"
          comparator: "eq"
          expected: 1


- test:
    name: "TC04 - POST tao post moi -> 201 Created"
    url: "/posts"
    method: POST
    headers: {Content-Type: application/json}
    body: '{"title": "API Testing", "body": "PyRestTest Practice", "userId": 1}'
    expected_status: [201]
    validators:
      - compare:
          jsonpath_mini: "title"
          comparator: "eq"
          expected: "API Testing"
      - compare:
          jsonpath_mini: "userId"
          comparator: "eq"
          expected: 1


- test:
    name: "TC05 - PUT cap nhat toan bo post id=1 -> 200 OK"
    url: "/posts/1"
    method: PUT
    headers: {Content-Type: application/json}
    body: '{"id": 1, "title": "Updated Title", "body": "Updated Body", "userId": 1}'
    expected_status: [200]
    validators:
      - compare:
          jsonpath_mini: "title"
          comparator: "eq"
          expected: "Updated Title"
      - compare:
          jsonpath_mini: "body"
          comparator: "eq"
          expected: "Updated Body"
      - compare:
          jsonpath_mini: "userId"
          comparator: "eq"
          expected: 1


- test:
    name: "TC06 - PATCH cap nhat title post id=1 -> 200 OK"
    url: "/posts/1"
    method: PATCH
    headers: {Content-Type: application/json}
    body: '{"title": "Patched Title"}'
    expected_status: [200]
    validators:
      - compare:
          jsonpath_mini: "title"
          comparator: "eq"
          expected: "Patched Title"

- test:
    name: "TC07 - DELETE post id=1 -> 200 OK"
    url: "/posts/1"
    method: DELETE
    expected_status: [200]


# ============================================================
# COMMENTS
# ============================================================

- test:
    name: "TC08 - GET tat ca comments -> 200 OK"
    url: "/comments"
    method: GET
    expected_status: [200]
    validators:
      - compare:
          jsonpath_mini: "0.id"
          comparator: "eq"
          expected: 1
      - compare:
          jsonpath_mini: "0.postId"
          comparator: "eq"
          expected: 1


- test:
    name: "TC09 - GET comments theo postId=1 -> 200 OK"
    url: "/comments?postId=1"
    method: GET
    expected_status: [200]
    validators:
      - compare:
          jsonpath_mini: "0.postId"
          comparator: "eq"
          expected: 1


# ============================================================
# USERS
# ============================================================

- test:
    name: "TC10 - GET tat ca users -> 200 OK"
    url: "/users"
    method: GET
    expected_status: [200]
    validators:
      - compare:
          jsonpath_mini: "0.id"
          comparator: "eq"
          expected: 1
      - compare:
          jsonpath_mini: "0.name"
          comparator: "eq"
          expected: "Leanne Graham"


- test:
    name: "TC11 - GET user hop le id=1 -> 200 OK"
    url: "/users/1"
    method: GET
    expected_status: [200]
    validators:
      - compare:
          jsonpath_mini: "id"
          comparator: "eq"
          expected: 1
      - compare:
          jsonpath_mini: "name"
          comparator: "eq"
          expected: "Leanne Graham"


- test:
    name: "TC12 - POST tao user moi -> 201 Created"
    url: "/users"
    method: POST
    headers: {Content-Type: application/json}
    body: '{"name": "Nguyen Van A", "username": "vana", "email": "vana@example.com"}'
    expected_status: [201]
    validators:
      - compare:
          jsonpath_mini: "name"
          comparator: "eq"
          expected: "Nguyen Van A"
      - compare:
          jsonpath_mini: "username"
          comparator: "eq"
          expected: "vana"
      - compare:
          jsonpath_mini: "email"
          comparator: "eq"
          expected: "vana@example.com"


